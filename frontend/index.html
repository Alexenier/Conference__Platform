<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conference Platform — Вхід</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">

      <div class="text-center mb-4">
        <i class="bi bi-journal-richtext text-primary" style="font-size: 3rem;"></i>
        <h2 class="fw-bold mt-2">Conference Platform</h2>
        <p class="text-muted">Платформа управління науковими конференціями</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h5 class="card-title mb-4">Вхід до системи</h5>
          <div id="loginError" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Пароль</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
          </div>
          <button class="btn btn-primary w-100" onclick="doLogin()">
            <i class="bi bi-box-arrow-in-right"></i> Увійти
          </button>
        </div>
      </div>

      <p class="text-center text-muted mt-3" style="font-size: 0.85rem;">
        Доступ надається адміністратором системи
      </p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/router.js"></script>
<script>
  if (auth.isLoggedIn()) redirectByRole();

  async function doLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl = document.getElementById("loginError");
    errEl.classList.add("d-none");

    try {
      const data = await api.login({ email, password });
      auth.saveSession(data.access_token, null);
      await redirectByRole();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove("d-none");
    }
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
