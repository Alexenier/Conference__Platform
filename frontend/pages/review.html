<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Орг. комітет — Conference Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-journal-richtext"></i> Conference Platform</span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white" id="userName"></span>
      <button class="btn btn-outline-light btn-sm" onclick="auth.logout()" title="Вийти">
        <i class="bi bi-box-arrow-right"></i> Вийти
      </button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="filterConference" class="form-label">Конференція</label>
          <select id="filterConference" class="form-select" aria-label="Фільтр по конференції" onchange="loadSubmissions()">
            <option value="">Всі конференції</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="filterStatus" class="form-label">Статус</label>
          <select id="filterStatus" class="form-select" aria-label="Фільтр по статусу" onchange="loadSubmissions()">
            <option value="">Всі статуси</option>
            <option value="draft">Чернетка</option>
            <option value="submitted">Подано</option>
            <option value="under_review">На розгляді</option>
            <option value="accepted">Прийнято</option>
            <option value="rejected">Відхилено</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="filterSection" class="form-label">Секція</label>
          <select id="filterSection" class="form-select" aria-label="Фільтр по секції" onchange="loadSubmissions()">
            <option value="">Всі секції</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" onclick="resetFilters()" title="Скинути фільтри">
            <i class="bi bi-arrow-counterclockwise"></i> Скинути
          </button>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-12">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Пошук по назві, анотації, авторах...">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-file-earmark-text"></i> Заявки <span id="submissionsCount" class="text-muted fs-6"></span></h5>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" onclick="openProgramModal()" title="Завантажити програму">
        <i class="bi bi-file-earmark-pdf"></i> Програма
      </button>
    </div>
  </div>

  <div id="pageAlert" class="alert d-none"></div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Доповідь</th>
            <th>Секція</th>
            <th>Конференція</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="submissionsTable">
          <tr><td colspan="6" class="text-center text-muted py-4">Завантаження...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal: Деталі заявки -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detailModalLabel">Деталі заявки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body" id="detailModalBody"></div>
      <div class="modal-footer" id="detailModalFooter"></div>
    </div>
  </div>
</div>

<!-- Modal: Програма конференції -->
<div class="modal fade" id="programModal" tabindex="-1" aria-labelledby="programModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="programModalLabel"><i class="bi bi-file-earmark-pdf"></i> Генерація програми конференції</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">Заповніть дані для кожної секції. Поля необов'язкові — можна залишити порожніми.</p>
        <div id="sectionsForm"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="generateProgram()">
          <i class="bi bi-download"></i> Згенерувати PDF
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/review.js"></script>
</body>
</html>
