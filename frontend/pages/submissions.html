<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Мої заявки — Conference Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-journal-richtext"></i> Conference Platform</span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white" id="userName"></span>
      <button class="btn btn-outline-light btn-sm" onclick="auth.logout()" title="Вийти">
        <i class="bi bi-box-arrow-right"></i> Вийти
      </button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-file-earmark-text"></i> Мої заявки</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newSubmissionModal" title="Створити нову заявку">
      <i class="bi bi-plus-lg"></i> Нова заявка
    </button>
  </div>

  <div id="pageAlert" class="alert d-none"></div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Назва доповіді</th>
            <th>Секція</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Файли</th>
          </tr>
        </thead>
        <tbody id="submissionsTable">
          <tr><td colspan="5" class="text-center text-muted py-4">Завантаження...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- New Submission Modal -->
<div class="modal fade" id="newSubmissionModal" tabindex="-1" aria-labelledby="newSubmissionModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="newSubmissionModalLabel"><i class="bi bi-plus-circle"></i> Нова заявка</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="modalError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="conferenceSelect" class="form-label">Конференція</label>
          <select id="conferenceSelect" class="form-select" aria-label="Оберіть конференцію">
            <option value="">Завантаження...</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="subTitle" class="form-label">Назва доповіді</label>
          <input type="text" id="subTitle" class="form-control" placeholder="Введіть назву доповіді">
        </div>
        <div class="mb-3">
          <label for="sectionSelect" class="form-label">Секція</label>
          <select id="sectionSelect" class="form-select" aria-label="Оберіть секцію">
            <option value="">Оберіть секцію</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="subAbstract" class="form-label">Анотація</label>
          <textarea id="subAbstract" class="form-control" rows="3" placeholder="Короткий опис доповіді"></textarea>
        </div>
        <hr>
        <h6>Автори</h6>
        <div id="authorsList"></div>
        <button class="btn btn-outline-secondary btn-sm mt-2" onclick="addAuthorRow()" title="Додати автора">
          <i class="bi bi-person-plus"></i> Додати автора
        </button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="submitNewSubmission()" title="Подати заявку">
          <i class="bi bi-send"></i> Подати заявку
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Files Modal -->
<div class="modal fade" id="filesModal" tabindex="-1" aria-labelledby="filesModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="filesModalLabel"><i class="bi bi-paperclip"></i> Файли заявки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="filesList" class="mb-3"></div>
        <hr>
        <label for="fileInput" class="form-label">Завантажити тези (.docx)</label>
        <input type="file" id="fileInput" class="form-control" accept=".docx,.pdf" aria-label="Оберіть файл для завантаження">
        <div id="uploadResult" class="mt-2"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
        <button class="btn btn-primary" onclick="uploadFile()" title="Завантажити файл">
          <i class="bi bi-upload"></i> Завантажити
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/submissions.js"></script>
</body>
</html>
