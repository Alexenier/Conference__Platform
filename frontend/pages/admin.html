<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Адміністратор — Conference Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-journal-richtext"></i> Conference Platform</span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white" id="userName"></span>
      <button class="btn btn-outline-light btn-sm" onclick="auth.logout()" title="Вийти">
        <i class="bi bi-box-arrow-right"></i> Вийти
      </button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <ul class="nav nav-tabs mb-4" id="adminTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="showTab('users')">
        <i class="bi bi-people"></i> Користувачі
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="showTab('conferences')">
        <i class="bi bi-calendar-event"></i> Конференції
      </button>
    </li>
  </ul>

  <!-- Вкладка: Користувачі -->
  <div id="tab-users">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Користувачі системи</h5>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createUserModal" title="Додати користувача">
        <i class="bi bi-person-plus"></i> Додати користувача
      </button>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Ім'я</th>
              <th>Email</th>
              <th>Роль</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="4" class="text-center text-muted py-4">Завантаження...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Вкладка: Конференції -->
  <div id="tab-conferences" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Конференції</h5>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createConferenceModal" title="Створити конференцію">
        <i class="bi bi-plus-lg"></i> Нова конференція
      </button>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Назва</th>
              <th>Дедлайн подачі</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="conferencesTable">
            <tr><td colspan="4" class="text-center text-muted py-4">Завантаження...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Modal: Створити користувача -->
<div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createUserModalLabel"><i class="bi bi-person-plus"></i> Новий користувач</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="createUserError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="newUserName" class="form-label">Повне ім'я</label>
          <input type="text" id="newUserName" class="form-control" placeholder="Іванов Іван Іванович">
        </div>
        <div class="mb-3">
          <label for="newUserEmail" class="form-label">Email</label>
          <input type="email" id="newUserEmail" class="form-control" placeholder="user@example.com">
        </div>
        <div class="mb-3">
          <label for="newUserPassword" class="form-label">Пароль</label>
          <input type="text" id="newUserPassword" class="form-control" placeholder="Тимчасовий пароль">
        </div>
        <div class="mb-3">
          <label for="newUserRole" class="form-label">Роль</label>
          <select id="newUserRole" class="form-select" aria-label="Оберіть роль">
            <option value="1">Учасник (participant)</option>
            <option value="2">Орг. комітет (org_committee)</option>
            <option value="3">Адміністратор (admin)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createUser()">
          <i class="bi bi-check-lg"></i> Створити
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Створити конференцію -->
<div class="modal fade" id="createConferenceModal" tabindex="-1" aria-labelledby="createConferenceModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createConferenceModalLabel"><i class="bi bi-calendar-plus"></i> Нова конференція</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="createConfError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="confTitle" class="form-label">Назва конференції</label>
          <input type="text" id="confTitle" class="form-control" placeholder="ІІС&Т 2025">
        </div>
        <div class="mb-3">
          <label for="confDescription" class="form-label">Підзаголовок / опис</label>
          <textarea id="confDescription" class="form-control" rows="2" placeholder="Двадцять третя всеукраїнська конференція..."></textarea>
        </div>
        <div class="mb-3">
          <label for="confDeadline" class="form-label">Дедлайн подачі тез</label>
          <input type="datetime-local" id="confDeadline" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createConference()">
          <i class="bi bi-check-lg"></i> Створити
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Редагувати конференцію -->
<div class="modal fade" id="editConferenceModal" tabindex="-1" aria-labelledby="editConferenceModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editConferenceModalLabel"><i class="bi bi-pencil"></i> Редагувати конференцію</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editConfId">
        <div id="editConfError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="editConfTitle" class="form-label">Назва конференції</label>
          <input type="text" id="editConfTitle" class="form-control">
        </div>
        <div class="mb-3">
          <label for="editConfDescription" class="form-label">Підзаголовок / опис</label>
          <textarea id="editConfDescription" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label for="editConfDeadline" class="form-label">Дедлайн подачі тез</label>
          <input type="datetime-local" id="editConfDeadline" class="form-control">
          <div class="form-text text-muted">
            <i class="bi bi-info-circle"></i> Зміна дедлайну дозволяє продовжити або скоротити прийом тез
          </div>
        </div>
        <div class="mb-3">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="editConfActive">
            <label class="form-check-label" for="editConfActive">Конференція активна</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="saveEditConference()">
          <i class="bi bi-check-lg"></i> Зберегти
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
