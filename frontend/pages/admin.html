<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Адміністратор — Conference Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-journal-richtext"></i> Conference Platform</span>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white" id="userName"></span>
      <button class="btn btn-outline-light btn-sm" onclick="auth.logout()" title="Вийти">
        <i class="bi bi-box-arrow-right"></i> Вийти
      </button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- Вкладки -->
  <ul class="nav nav-tabs mb-4" id="adminTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="showTab('users')">
        <i class="bi bi-people"></i> Користувачі
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="showTab('conferences')">
        <i class="bi bi-calendar-event"></i> Конференції
      </button>
    </li>
  </ul>

  <!-- Вкладка: Користувачі -->
  <div id="tab-users">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Користувачі системи</h5>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createUserModal" title="Додати користувача">
        <i class="bi bi-person-plus"></i> Додати користувача
      </button>
    </div>

    <div id="usersAlert" class="alert d-none"></div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Ім'я</th>
              <th>Email</th>
              <th>Роль</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="4" class="text-center text-muted py-4">Завантаження...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Вкладка: Конференції -->
  <div id="tab-conferences" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Конференції</h5>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createConferenceModal" title="Створити конференцію">
        <i class="bi bi-plus-lg"></i> Нова конференція
      </button>
    </div>

    <div id="conferencesAlert" class="alert d-none"></div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Назва</th>
              <th>Дедлайн подачі</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="conferencesTable">
            <tr><td colspan="4" class="text-center text-muted py-4">Завантаження...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Modal: Створити користувача -->
<div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createUserModalLabel"><i class="bi bi-person-plus"></i> Новий користувач</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="createUserError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="newUserName" class="form-label">Повне ім'я</label>
          <input type="text" id="newUserName" class="form-control" placeholder="Іванов Іван Іванович">
        </div>
        <div class="mb-3">
          <label for="newUserEmail" class="form-label">Email</label>
          <input type="email" id="newUserEmail" class="form-control" placeholder="user@example.com">
        </div>
        <div class="mb-3">
          <label for="newUserPassword" class="form-label">Пароль</label>
          <input type="text" id="newUserPassword" class="form-control" placeholder="Тимчасовий пароль">
        </div>
        <div class="mb-3">
          <label for="newUserRole" class="form-label">Роль</label>
          <select id="newUserRole" class="form-select" aria-label="Оберіть роль">
            <option value="1">Учасник (participant)</option>
            <option value="2">Орг. комітет (org_committee)</option>
            <option value="3">Адміністратор (admin)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createUser()" title="Створити користувача">
          <i class="bi bi-check-lg"></i> Створити
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Створити конференцію -->
<div class="modal fade" id="createConferenceModal" tabindex="-1" aria-labelledby="createConferenceModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createConferenceModalLabel"><i class="bi bi-calendar-plus"></i> Нова конференція</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
      </div>
      <div class="modal-body">
        <div id="createConfError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="confTitle" class="form-label">Назва конференції</label>
          <input type="text" id="confTitle" class="form-control" placeholder="ІІС&Т 2025">
        </div>
        <div class="mb-3">
          <label for="confDescription" class="form-label">Опис</label>
          <textarea id="confDescription" class="form-control" rows="3" placeholder="Короткий опис конференції"></textarea>
        </div>
        <div class="mb-3">
          <label for="confDeadline" class="form-label">Дедлайн подачі тез</label>
          <input type="datetime-local" id="confDeadline" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createConference()" title="Створити конференцію">
          <i class="bi bi-check-lg"></i> Створити
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  auth.requireAuth();

  const ROLE_LABELS = {
    1: { label: "Учасник", cls: "secondary" },
    2: { label: "Орг. комітет", cls: "info" },
    3: { label: "Адміністратор", cls: "danger" },
  };

  async function init() {
    const user = auth.getUser() || await api.me();
    document.getElementById("userName").textContent = user.full_name || user.email;
    await loadUsers();
    await loadConferences();
  }

  function showTab(tab) {
    document.getElementById("tab-users").classList.toggle("d-none", tab !== "users");
    document.getElementById("tab-conferences").classList.toggle("d-none", tab !== "conferences");
    document.querySelectorAll("#adminTabs .nav-link").forEach((el, i) => {
      el.classList.toggle("active", (i === 0 && tab === "users") || (i === 1 && tab === "conferences"));
    });
  }

  async function loadUsers() {
    const tbody = document.getElementById("usersTable");
    try {
      const users = await api.getUsers();
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Користувачів немає</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => {
        const roles = u.role_ids.map(id => {
          const r = ROLE_LABELS[id] || { label: id, cls: "secondary" };
          return `<span class="badge bg-${r.cls} me-1">${r.label}</span>`;
        }).join("");
        return `
          <tr>
            <td>${u.full_name || "—"}</td>
            <td>${u.email}</td>
            <td>${roles}</td>
            <td class="text-end">
              <button class="btn btn-outline-danger btn-sm" title="Видалити користувача" onclick="deleteUser('${u.id}', '${u.email}')">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>`;
      }).join("");
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  async function createUser() {
    const errEl = document.getElementById("createUserError");
    errEl.classList.add("d-none");

    const full_name = document.getElementById("newUserName").value.trim();
    const email = document.getElementById("newUserEmail").value.trim();
    const password = document.getElementById("newUserPassword").value.trim();
    const role_id = parseInt(document.getElementById("newUserRole").value);

    if (!email || !password) {
      errEl.textContent = "Email та пароль обов'язкові";
      errEl.classList.remove("d-none");
      return;
    }

    try {
      await api.createUser({ full_name, email, password, role_id });
      bootstrap.Modal.getInstance(document.getElementById("createUserModal")).hide();
      document.getElementById("newUserName").value = "";
      document.getElementById("newUserEmail").value = "";
      document.getElementById("newUserPassword").value = "";
      await loadUsers();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove("d-none");
    }
  }

  async function deleteUser(userId, email) {
    if (!confirm(`Видалити користувача ${email}?`)) return;
    try {
      await api.deleteUser(userId);
      await loadUsers();
    } catch (e) {
      alert(e.message);
    }
  }

  async function loadConferences() {
    const tbody = document.getElementById("conferencesTable");
    try {
      const conferences = await api.getConferences();
      if (!conferences.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Конференцій ще немає</td></tr>`;
        return;
      }
      tbody.innerHTML = conferences.map(c => `
        <tr>
          <td>
            <div class="fw-semibold">${c.title}</div>
            <small class="text-muted">${c.description || ""}</small>
          </td>
          <td><small>${new Date(c.submission_deadline).toLocaleDateString("uk-UA")}</small></td>
          <td>
            <span class="badge bg-${c.is_active ? "success" : "secondary"}">
              ${c.is_active ? "Активна" : "Завершена"}
            </span>
          </td>
          <td class="text-end d-flex gap-1 justify-content-end">
            <a href="${api.downloadProgram(c.id)}" class="btn btn-outline-secondary btn-sm" title="Завантажити програму" target="_blank">
              <i class="bi bi-file-earmark-pdf"></i>
            </a>
            <button class="btn btn-outline-danger btn-sm" title="Видалити конференцію" onclick="deleteConference('${c.id}', '${c.title}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`).join("");
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">${e.message}</td></tr>`;
    }
  }

  async function createConference() {
    const errEl = document.getElementById("createConfError");
    errEl.classList.add("d-none");

    const title = document.getElementById("confTitle").value.trim();
    const description = document.getElementById("confDescription").value.trim();
    const deadline = document.getElementById("confDeadline").value;

    if (!title || !deadline) {
      errEl.textContent = "Назва та дедлайн обов'язкові";
      errEl.classList.remove("d-none");
      return;
    }

    try {
      await api.createConference({
        title,
        description: description || null,
        submission_deadline: new Date(deadline).toISOString(),
      });
      bootstrap.Modal.getInstance(document.getElementById("createConferenceModal")).hide();
      document.getElementById("confTitle").value = "";
      document.getElementById("confDescription").value = "";
      document.getElementById("confDeadline").value = "";
      await loadConferences();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove("d-none");
    }
  }

  async function deleteConference(id, title) {
    if (!confirm(`Видалити конференцію "${title}"?`)) return;
    try {
      await api.deleteConference(id);
      await loadConferences();
    } catch (e) {
      alert(e.message);
    }
  }

  init();
</script>
</body>
</html>
